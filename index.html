	<body>
		<main class="main-container home-section">
			<section id="home">
				<div class="landing-page-details">
					<h1 class="small-title">Hi,</h1>
					<h2 class="big-title">
						I'm <span class="my-name accent">Pratik Shastrakar</span>
					</h2>

					<h3 class="medium-title">
						<em
							>Technology Associate @
							<a class="accent" href="https://www.morganstanley.com/"
								>Morgan Stanley</a
							></em
						>
					</h3>
					<div class="short-bio" data-start-month="08" data-start-year="2023">
						<p>
							SRE/ Devops Engineer with
							<span id="experience-duration"></span> of experience, Cloud &
							DevOps enthusiast, based in Mumbai, India.
						</p>
					</div>
					<!-- <div class="cta-container email-container">
                        <a href="mailto:pppsdev@gmail.com" class="cta email-button">
                            <img src="./img/email.svg" alt="Email Icon">
                            <span>Say Hello</span>
                        </a>
                    </div> -->
				</div>
				<div class="art-me">
					<img
						src="./assets/images/ps.png"
						alt="Icon of me. Art credits to my dear friend Shantanu Amle"
					/>
				</div>
				<div class="landing-page-socials">
					<ul id="home-socials"></ul>
				</div>
			</section>
			<section class="projects" id="select-projects">
				<h2 class="h3-color">Select Projects</h2>
				<p class="section-description">
					Here are some of my personal projects I have worked on.<br />
					You can find more on
					<a class="hyperlink" href="https://github.com/pratikks01">GitHub</a>.
				</p>
				<div
					class="project-cards-container"
					id="select-projects-container"
				></div>
				<div class="cta-container">
					<a href="/projects.html" class="cta">
						<img src="./assets/images/icons/coding.svg" alt="Code Icon" />
						<span>Explore More</span>
					</a>
				</div>
			</section>
		</main>

		<script src="./assets/js/templates.js"></script>
		<script src="./assets/js/components.js"></script>
		<script src="./assets/js/main.js"></script>
		<script>
			initPage((data) => {
				// Render home page social links
				const homeSocials = document.getElementById("home-socials");
				homeSocials.innerHTML = data.socials
					.slice(0, 4)
					.map((social) => createSocialLink(social))
					.join("");

				// Render select projects (only those marked for homepage)
				const projectsContainer = document.getElementById(
					"select-projects-container",
				);
				projectsContainer.innerHTML = data.projects
					.filter((project) => project.showOnHome)
					.map(createProjectCard)
					.join("");

				// Calculate total experience
				calculateTotalExperience(data.profile.gapMonths || 0);
			});
		</script>
	</body>
</html>

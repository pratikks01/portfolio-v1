			content="Pratik Shastrakar, Pratik Shastrakar Portfolio, Pratik Shastrakar Photography, photographer, developer, java, python, html, css, javascript, web developer, webdev, portfolio, devops, cloud, aws, azure, student, rcoem, nagpur, engineer"

			href="https://pratikshastrakar.netlify.app/projects"

		<link rel="stylesheet" href="./css/main.css" type="text/css" />
		<link rel="stylesheet" href="./css/header.css" type="text/css" />
		<link rel="stylesheet" href="./css/projects.css" type="text/css" />
		<link rel="stylesheet" href="./css/footer.css" type="text/css" />
	</head>

	<body>
		<main class="main-container project-section">
			<section class="projects">
				<div class="page-title">
					<img src="./img/coding.svg" alt="Code Icon" />
					<h2>pratik.<span class="pink">projects</span></h2>
				</div>
				<p class="section-description">
					Here are some of my personals projects.<br />
					Also take a look at my
					<a class="hyperlink" href="https://github.com/pratikks01">GitHub</a>
					profile for more details.
				</p>
				<div class="project-cards-container"></div>
			</section>
		</main>

		<script src="./js/templates.js"></script>
		<script src="./js/components.js"></script>
		<script src="./js/main.js"></script>
		<script>
			// Load and render projects from data.json
			fetch("./data.json")
				.then((res) => res.json())
				.then((data) => {
					// Inject header and footer
					injectHeader(data.profile, data.socials);
					injectFooter(data.profile, data.socials);

					// Setup menu toggle AFTER header is injected
					setupMenuToggle();

					const container = document.querySelector(".project-cards-container");
					container.innerHTML = data.projects.map(createProjectCard).join("");
				})
				.catch((err) => console.error("Error loading projects:", err));
		</script>
	</body>

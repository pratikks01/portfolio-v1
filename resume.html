<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Resume ~ Pratik Shastrakar</title>
		<meta charset="UTF-8" />
		<link rel="apple-touch-icon" sizes="180x180" href="./assets/favicons/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="./assets/favicons/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="./assets/favicons/favicon-16x16.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css?family=Nunito" rel="stylesheet" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
		
		<link rel="stylesheet" href="./assets/css/main.css" type="text/css" />
		<link rel="stylesheet" href="./assets/css/header.css" type="text/css" />
		<link rel="stylesheet" href="./assets/css/components.css" type="text/css" />
		<link rel="stylesheet" href="./assets/css/pages.css" type="text/css" />
		<link rel="stylesheet" href="./assets/css/footer.css" type="text/css" />
		
		<style>
			.resume-container {
				max-width: 900px;
				margin: 50px auto;
				padding: 40px;
				background-color: #ffffff;
				color: #333333; /* Dark text for readability on white background like a real document */
				border-radius: 10px;
				font-family: "Nunito", sans-serif;
			}
			
			/* Adjust global dark mode overrides for this specific white container */
			.resume-container * {
				color: #333333;
			}
			
			.resume-header {
				text-align: center;
				margin-bottom: 30px;
			}
			.resume-header h1 {
				font-size: 2.5em;
				margin-bottom: 5px;
				text-transform: uppercase;
				letter-spacing: 2px;
				color: #111;
			}
			.resume-contact {
				font-size: 0.9em;
				color: #555;
			}
			.resume-contact a {
				color: var(--color-primary);
				text-decoration: none;
			}
			.resume-contact a:hover {
				text-decoration: underline;
			}
			
			.resume-section {
				margin-bottom: 25px;
			}
			.resume-section h2 {
				font-size: 1.4em;
				text-transform: uppercase;
				border-bottom: 2px solid #333;
				padding-bottom: 5px;
				margin-bottom: 15px;
				color: #111;
			}
			
			.resume-item {
				margin-bottom: 15px;
			}
			.resume-item-header {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
				margin-bottom: 5px;
			}
			.resume-item-title {
				font-weight: 700;
				font-size: 1.1em;
			}
			.resume-item-location {
				font-size: 0.9em;
			}
			.resume-item-subheader {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
				font-style: italic;
				margin-bottom: 5px;
				font-size: 0.95em;
			}
			
			.resume-list {
				list-style-type: disc;
				padding-left: 20px;
				margin-top: 5px;
			}
			.resume-list li {
				margin-bottom: 5px;
				font-size: 0.95em;
				line-height: 1.5;
			}
			
			.resume-skills p {
				margin-bottom: 5px;
				line-height: 1.6;
			}
			.resume-skills strong {
				font-weight: 700;
				color: #111;
			}
			
			/* Controls for downloading */
			.resume-controls {
				display: flex;
				justify-content: center;
				gap: 20px;
				margin-bottom: 30px;
			}
			
			/* Responsive Mobile Adjustments */
			@media (max-width: 768px) {
				.resume-container {
					padding: 20px 15px;
					margin: 20px 10px;
					font-size: 0.95em; /* Slightly smaller base font */
				}
				.resume-header h1 {
					font-size: 1.8em;
				}
				.resume-contact {
					line-height: 1.6;
				}
				/* Stack header rows vertically on mobile instead of side-by-side */
				.resume-item-header, .resume-item-subheader {
					flex-direction: column;
					align-items: flex-start;
				}
				/* Add a little spacing when stacked */
				.resume-item-location, 
				.resume-item-subheader span:last-child {
					margin-top: 2px;
					color: #666; /* Subdue the secondary info slightly */
				}
			}
		</style>
	</head>

	<body>
		<main class="main-container project-section">
			<section>
				<div class="page-title">
					<img src="./assets/images/icons/resume.svg" alt="Resume Icon" />
					<h2>pratik.<span class="pink">resume</span></h2>
				</div>
				<p class="section-description">My professional experience and academic background.</p>
				
				<div class="resume-controls">
					<a href="https://drive.google.com/file/d/1PLHaR6uDRmem_EKe8ZmBNlyG1XI3SIaX/view?usp=sharing" target="_blank" rel="noopener noreferrer" class="btn">
						<i class="fa-solid fa-file-pdf"></i> Download PDF
					</a>
				</div>

				<div class="resume-container" id="resume-content">
					<!-- Resume content will be injected by JavaScript here -->
					<p style="text-align:center;">Loading Resume...</p>
				</div>
			</section>
		</main>

		<!-- Dynamic injection templates -->
		<script src="./assets/js/templates.js"></script>
		<script src="./assets/js/components.js"></script>
		<script src="./assets/js/main.js"></script>
		<script src="./assets/js/resume.js"></script>
		<script>
			// The header and footer will be automatically injected by main.js
			initPage();
		</script>
	</body>
</html>
